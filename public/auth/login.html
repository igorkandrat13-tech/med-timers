<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход</title>
  <link rel="stylesheet" href="/admin/css/admin-design.css">
  <link rel="stylesheet" href="/auth/auth.css">
</head>
<body>
  <main class="auth-shell">
    <section class="auth-card" aria-label="Авторизация">
      <div class="auth-header">
        <div class="auth-title-row">
          <div class="auth-logo" aria-hidden="true">🕗</div>
          <div>
            <div class="auth-title" id="login-title">Вход</div>
            <div class="auth-subtitle">Med Timers</div>
          </div>
        </div>
        <div class="auth-badge" id="role-badge"></div>
      </div>

      <div class="auth-body">
        <div class="auth-field">
          <label class="auth-label" id="login-label" for="username">Логин</label>
          <input class="auth-input" type="text" id="username" placeholder="Введите логин" autocomplete="username">
          <select class="auth-input" id="user-select" style="display:none;">
            <option value="">Выберите пользователя</option>
          </select>
        </div>

        <div class="auth-field">
          <label class="auth-label" id="password-label" for="password">Пароль</label>
          <div class="auth-password">
            <input class="auth-input" type="password" id="password" placeholder="Введите пароль" autocomplete="current-password">
            <button class="auth-eye" id="toggle-password" type="button" aria-label="Показать пароль">👁️</button>
          </div>
          <div class="pinpad hidden" id="pinpad">
            <div class="pinpad-display" id="pinpad-display" aria-label="ПИН"></div>
            <div class="pinpad-grid" id="pinpad-grid">
              <button type="button" class="pinpad-btn" data-digit="1">1</button>
              <button type="button" class="pinpad-btn" data-digit="2">2</button>
              <button type="button" class="pinpad-btn" data-digit="3">3</button>
              <button type="button" class="pinpad-btn" data-digit="4">4</button>
              <button type="button" class="pinpad-btn" data-digit="5">5</button>
              <button type="button" class="pinpad-btn" data-digit="6">6</button>
              <button type="button" class="pinpad-btn" data-digit="7">7</button>
              <button type="button" class="pinpad-btn" data-digit="8">8</button>
              <button type="button" class="pinpad-btn" data-digit="9">9</button>
              <button type="button" class="pinpad-btn pinpad-btn-secondary" data-action="clear">Очистить</button>
              <button type="button" class="pinpad-btn" data-digit="0">0</button>
              <button type="button" class="pinpad-btn pinpad-btn-secondary" data-action="back">⌫</button>
            </div>
          </div>
        </div>

        <div class="auth-error" id="error" role="alert" aria-live="polite"></div>
      </div>

      <div class="auth-actions">
        <div class="auth-actions-row">
          <a class="btn btn-cancel auth-back" href="/" id="back-btn">← Назад</a>
          <button class="btn btn-save auth-submit" id="login-btn">Войти</button>
        </div>
      </div>
    </section>
  </main>
  <script>
    const params = new URLSearchParams(location.search);
    const role = params.get('role') || 'admin';
    const titleEl = document.getElementById('login-title');
    const badgeEl = document.getElementById('role-badge');
    const btn = document.getElementById('login-btn');
    const errEl = document.getElementById('error');
    const userEl = document.getElementById('username');
    const userSelectEl = document.getElementById('user-select');
    const loginLabelEl = document.getElementById('login-label');
    const passEl = document.getElementById('password');
    const passwordLabelEl = document.getElementById('password-label');
    const toggleEl = document.getElementById('toggle-password');
    const pinpadEl = document.getElementById('pinpad');
    const pinpadDisplayEl = document.getElementById('pinpad-display');
    const pinpadGridEl = document.getElementById('pinpad-grid');
    let pinValue = '';
    const PIN_MIN = 4;
    const PIN_MAX = 10;

    titleEl.textContent = 'Вход';
    badgeEl.textContent = role === 'doctor' ? 'Врач' : 'Администратор';

    async function loadDoctorUsers() {
      try {
        const res = await fetch('/api/users/public');
        const text = await res.text();
        let data = null;
        try { data = JSON.parse(text); } catch (_) {}
        const list = data && data.users ? data.users : [];
        userSelectEl.innerHTML = '<option value="">Выберите пользователя</option>';
        list.forEach(u => {
          const opt = document.createElement('option');
          opt.value = String(u.id);
          opt.textContent = u.fio;
          userSelectEl.appendChild(opt);
        });
        if (!list.length) {
          errEl.textContent = 'Нет пользователей. Добавьте их в админке.';
        }
      } catch (e) {
        errEl.textContent = e.message || 'Не удалось загрузить пользователей';
      }
    }

    if (role === 'doctor') {
      loginLabelEl.textContent = 'Пользователь';
      userEl.style.display = 'none';
      userSelectEl.style.display = 'block';
      passwordLabelEl.textContent = 'ПИН-код';
      passEl.value = '';
      passEl.style.display = 'none';
      toggleEl.style.display = 'none';
      if (pinpadEl) pinpadEl.classList.remove('hidden');
      loadDoctorUsers();
    }

    toggleEl.addEventListener('click', () => {
      const isPwd = passEl.type === 'password';
      passEl.type = isPwd ? 'text' : 'password';
      toggleEl.textContent = isPwd ? '🙈' : '👁️';
      toggleEl.setAttribute('aria-label', isPwd ? 'Скрыть пароль' : 'Показать пароль');
      passEl.focus();
    });

    function renderPinpad() {
      if (!pinpadDisplayEl) return;
      const dots = '●'.repeat(pinValue.length);
      const placeholders = '○'.repeat(Math.max(0, PIN_MIN - pinValue.length));
      pinpadDisplayEl.textContent = dots + placeholders;
      passEl.value = pinValue;
    }

    function setPinValue(next) {
      pinValue = String(next || '').replace(/\D/g, '').slice(0, PIN_MAX);
      renderPinpad();
    }

    if (role === 'doctor') {
      renderPinpad();
      userSelectEl.addEventListener('change', () => setPinValue(''));
      if (pinpadGridEl) {
        pinpadGridEl.addEventListener('click', (e) => {
          const t = e.target;
          if (!(t instanceof HTMLElement)) return;
          const digit = t.getAttribute('data-digit');
          const action = t.getAttribute('data-action');
          if (digit !== null) {
            setPinValue(pinValue + digit);
            return;
          }
          if (action === 'back') {
            setPinValue(pinValue.slice(0, -1));
            return;
          }
          if (action === 'clear') {
            setPinValue('');
          }
        });
      }

      document.addEventListener('keydown', (e) => {
        if (role !== 'doctor') return;
        if (e.key >= '0' && e.key <= '9') {
          setPinValue(pinValue + e.key);
          return;
        }
        if (e.key === 'Backspace') {
          setPinValue(pinValue.slice(0, -1));
          return;
        }
        if (e.key === 'Escape') {
          setPinValue('');
          return;
        }
        if (e.key === 'Enter') {
          doLogin();
        }
      });
    }

    async function doLogin() {
      const username = userEl.value.trim();
      const password = passEl.value;
      errEl.textContent = '';
      btn.disabled = true;
      btn.textContent = 'Входим...';
      try {
        if (role === 'doctor' && !userSelectEl.value) {
          errEl.textContent = 'Выберите пользователя';
          return;
        }
        if (role === 'doctor') {
          if (!/^\d+$/.test(password)) {
            errEl.textContent = 'Введите ПИН-код';
            return;
          }
          if (password.length < PIN_MIN || password.length > PIN_MAX) {
            errEl.textContent = `ПИН должен быть ${PIN_MIN}-${PIN_MAX} цифр`;
            return;
          }
        }
        const payload = role === 'doctor'
          ? { role: 'doctor', userId: userSelectEl.value, pin: password }
          : { role: 'admin', username, password };
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const text = await res.text();
        let data = null;
        try { data = JSON.parse(text); } catch (_) {}
        if (!res.ok || !data || !data.success) {
          const msg = (data && data.error) ? data.error : (text || 'Ошибка входа');
          errEl.textContent = msg;
          return;
        }
        if (role === 'doctor') location.href = '/doctor/doctor.html';
        else location.href = '/admin/admin.html';
      } catch (e) {
        errEl.textContent = e.message || 'Ошибка сети';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Войти';
      }
    }

    btn.addEventListener('click', doLogin);
    userEl.addEventListener('keydown', (e) => { if (e.key === 'Enter') doLogin(); });
    if (role !== 'doctor') passEl.addEventListener('keydown', (e) => { if (e.key === 'Enter') doLogin(); });
    (role === 'doctor' ? userSelectEl : userEl).focus();
  </script>
</body>
</html>
